<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>To-Do List Pro</title>
    <meta name="theme-color" content="#060608">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="header-top">
                <div class="header-title-box">
                    <h1>Завдання</h1>
                    <p id="date-display"></p>
                </div>
                <div class="header-actions">
                    <div class="streak-badge" id="streak-badge">🔥 0</div>
                    <button class="icon-btn" id="btn-analytics" aria-label="Аналітика">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 20V10l-6 4-6-4v10M12 20V4l-6 4-6-4v16M6 20v-4l-6 4-6-4v8" />
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- View 1: List -->
        <main class="content tab-view active" id="view-list">
            <div class="filters-container">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="M21 21L16.65 16.65" />
                    </svg>
                    <input type="text" id="search-input" placeholder="Знайти завдання...">
                </div>
                <div class="daily-progress-container">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <span style="font-size:14px; font-weight:600; color:var(--text-secondary);">Прогрес дня</span>
                        <span id="daily-progress-text"
                            style="font-size:14px; font-weight:700; color:var(--text-primary);">0%</span>
                    </div>
                    <div
                        style="width:100%; height:8px; background:rgba(255,255,255,0.05); border-radius:10px; overflow:hidden;">
                        <div id="daily-progress-bar"
                            style="height:100%; width:0%; background:linear-gradient(90deg, var(--primary-color), #d0b0ff); border-radius:10px; transition:0.4s;">
                        </div>
                    </div>
                </div>
                <div class="tabs-container">
                    <div class="tabs" id="category-tabs">
                        <button class="tab active" data-cat="all">Всі</button>
                        <button class="tab" data-cat="work">Навчання</button>
                        <button class="tab" data-cat="home">Дім</button>
                        <button class="tab" data-cat="personal">Особисте</button>
                    </div>
                </div>
            </div>

            <ul id="active-tasks" class="todo-list"></ul>
            <!-- Completed moved to history -->

            <!-- We add margin to account for bottom nav -->
            <div style="height: 48px;"></div>
        </main>

        <!-- View 2: Calendar -->
        <main class="content tab-view" id="view-calendar" style="display: none;">
            <div class="calendar-controls">
                <button id="cal-prev" class="icon-btn"><svg viewBox="0 0 24 24" width="20" height="20" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6" />
                    </svg></button>
                <h2 id="cal-month-title">Березень 2026</h2>
                <button id="cal-next" class="icon-btn"><svg viewBox="0 0 24 24" width="20" height="20" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M9 18l6-6-6-6" />
                    </svg></button>
            </div>

            <div class="calendar-views-toggle">
                <button class="cal-view-btn active" data-view="month">Місяць</button>
                <button class="cal-view-btn" data-view="week">Тиждень</button>
                <button class="cal-view-btn" data-view="day">День</button>
            </div>

            <div id="calendar-grid-container">
                <div class="cal-dow-header">
                    <span>Пн</span><span>Вв</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Нд</span>
                </div>
                <div id="calendar-grid" class="calendar-grid">
                    <!-- dynamically injected cells -->
                </div>
            </div>

            <div style="height: 48px;"></div>
        </main>

        <!-- View 3: Settings -->
        <main class="content tab-view" id="view-settings" style="display: none;">
            <h2>Налаштування</h2>
            <div style="margin-top: 24px;">
                <button id="btn-open-history" class="secondary-btn"
                    style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Історія виконаних завдань (<span id="settings-completed-count">0</span>)
                </button>
            </div>
        </main>

        <!-- FAB Add -->
        <button id="fab-add" class="fab" aria-label="Додати">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5V19M5 12H19" />
            </svg>
        </button>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-target="view-list">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />
                </svg>
                <span>Список</span>
            </button>
            <button class="nav-btn" data-target="view-calendar">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                    <path d="M16 2v4M8 2v4M3 10h18" />
                </svg>
                <span>Календар</span>
            </button>
            <button class="nav-btn" data-target="view-settings">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
                </svg>
                <span>Налаштування</span>
            </button>
        </nav>

        <div id="overlay" class="overlay"></div>

        <!-- Sheet: Додавання задачі -->
        <div id="bottom-sheet" class="bottom-sheet">
            <div class="sheet-header">
                <h2 id="sheet-title">Нове завдання</h2>
                <button id="close-sheet" class="icon-btn">✖</button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label>Назва</label>
                    <input type="text" id="task-title" required placeholder="Що плануєте зробити?" autocomplete="off">
                </div>
                <div class="form-row">
                    <div class="form-group half">
                        <label>Категорія</label>
                        <select id="task-category">
                            <option value="work">Навчання</option>
                            <option value="home">Дім</option>
                            <option value="personal" selected>Особисте</option>
                        </select>
                    </div>
                    <div class="form-group half">
                        <label>Пріоритет</label>
                        <select id="task-priority">
                            <option value="high">Високий</option>
                            <option value="medium" selected>Середній</option>
                            <option value="low">Низький</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group half">
                        <label>Дедлайн</label>
                        <input type="datetime-local" id="task-date">
                    </div>
                    <div class="form-group half">
                        <label>Повторення</label>
                        <select id="task-recurrence">
                            <option value="none">Ніколи</option>
                            <option value="daily">Щодня</option>
                            <option value="weekly">Щотижня</option>
                            <option value="monthly">Щомісяця</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Опис</label>
                    <textarea id="task-desc" rows="2" placeholder="Додайте деталі..."></textarea>
                </div>
                <button type="submit" class="primary-btn">Зберегти завдання</button>
            </form>
        </div>

        <!-- Sheet: Аналітика -->
        <div id="analytics-modal" class="bottom-sheet">
            <div class="sheet-header">
                <h2>📊 Ваша активність</h2>
                <button id="close-analytics" class="icon-btn">✖</button>
            </div>
            <div class="chart-container"><canvas id="analytics-chart"></canvas></div>
            <p class="analytics-subtext">Виконано завдань за 7 днів</p>
        </div>

        <!-- Daily Tasks Sheet (from Calendar View) -->
        <div id="daily-tasks-sheet" class="bottom-sheet">
            <div class="sheet-header">
                <h2 id="daily-sheet-title">Завдання</h2>
                <button id="close-daily-sheet" class="icon-btn">✖</button>
            </div>
            <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;">Утримуйте комірку календаря, щоб
                додати швидке завдання сюди.</p>
            <ul id="daily-tasks-list" class="todo-list"></ul>
        </div>

        <!-- Sheet: Історія -->
        <div id="history-sheet" class="bottom-sheet" style="padding-bottom: 20px;">
            <div class="sheet-header">
                <h2>Виконані завдання</h2>
                <button id="close-history-sheet" class="icon-btn">✖</button>
            </div>
            <ul id="completed-tasks" class="todo-list" style="margin-bottom: 40px;"></ul>
        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
